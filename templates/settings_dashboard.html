<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Manager - Professional Configuration Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d9ff;
            --secondary: #667eea;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stats-mini {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Content */
        .main {
            padding: 3rem 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 1.3rem;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 217, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--dark-bg);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* Settings List */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .setting-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .setting-info h3 {
            color: var(--primary);
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .setting-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .setting-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Toggle Switch */
        .toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        /* History List */
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--secondary);
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .history-item strong {
            color: var(--primary);
        }

        .history-time {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Alert Messages */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideDown 0.3s ease-out;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .stats-mini {
                width: 100%;
                justify-content: space-around;
            }

            .main {
                padding: 1.5rem 0;
            }

            .container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>⚙️ Settings Manager</h1>
                    <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 0.3rem;">Professional configuration dashboard</p>
                </div>
                <div class="header-actions">
                    <div class="stats-mini">
                        <div class="stat-item">
                            <div class="stat-value" id="totalSettings">0</div>
                            <div class="stat-label">Total Settings</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalChanges">0</div>
                            <div class="stat-label">Changes</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="exportSettings()">📥 Export</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="grid">
                <!-- Add Setting Card -->
                <div class="card">
                    <h2>Add New Setting</h2>
                    <div id="alertContainer"></div>
                    <form onsubmit="addSetting(event)">
                        <div class="form-group">
                            <label for="settingKey">Setting Name *</label>
                            <input type="text" id="settingKey" placeholder="e.g., theme, language" required>
                        </div>
                        <div class="form-group">
                            <label for="settingValue">Value *</label>
                            <input type="text" id="settingValue" placeholder="e.g., dark, english" required>
                        </div>
                        <div class="form-group">
                            <label for="settingCategory">Category</label>
                            <select id="settingCategory">
                                <option value="general">General</option>
                                <option value="appearance">Appearance</option>
                                <option value="notifications">Notifications</option>
                                <option value="privacy">Privacy</option>
                                <option value="advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="settingType">Type</label>
                            <select id="settingType">
                                <option value="text">Text</option>
                                <option value="toggle">Toggle</option>
                                <option value="dropdown">Dropdown</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="settingDesc">Description</label>
                            <input type="text" id="settingDesc" placeholder="Optional description">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">✨ Create Setting</button>
                    </form>
                </div>

                <!-- Quick Stats Card -->
                <div class="card">
                    <h2>Dashboard Stats</h2>
                    <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem;">
                        <div style="padding: 1.5rem; background: rgba(0, 217, 255, 0.1); border-radius: 8px; border-left: 3px solid var(--primary);">
                            <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.5rem;">Total Settings</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--primary);" id="statsTotal">0</div>
                        </div>
                        <div style="padding: 1.5rem; background: rgba(16, 185, 129, 0.1); border-radius: 8px; border-left: 3px solid var(--success);">
                            <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.5rem;">Total Categories</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--success);" id="statsCategories">0</div>
                        </div>
                        <div style="padding: 1.5rem; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border-left: 3px solid var(--secondary);">
                            <div style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.5rem;">Configuration Changes</div>
                            <div style="font-size: 2rem; font-weight: 700; color: var(--secondary);" id="statsHistoryCount">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="card">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('settings')">📋 Your Settings</button>
                    <button class="tab-btn" onclick="switchTab('history')">📝 Change History</button>
                </div>

                <!-- Settings Tab -->
                <div id="settings" class="tab-content active">
                    <div id="settingsContainer" class="settings-list">
                        <div class="empty-state">
                            <p>No settings yet. Create your first setting above! ✨</p>
                        </div>
                    </div>
                </div>

                <!-- History Tab -->
                <div id="history" class="tab-content">
                    <div class="history-list" id="historyContainer">
                        <div class="empty-state">
                            <p>No change history yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load settings on page load
        document.addEventListener('DOMContentLoaded', loadSettings);

        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                renderSettings(settings);
                loadStats();
                loadHistory();
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function renderSettings(settingsObj) {
            const container = document.getElementById('settingsContainer');
            
            if (Object.keys(settingsObj).length === 0) {
                container.innerHTML = `<div class="empty-state"><p>No settings yet. Create your first setting above! ✨</p></div>`;
                return;
            }

            let html = '';
            for (const [category, settings] of Object.entries(settingsObj)) {
                html += `<h3 style="color: var(--secondary); margin-top: 2rem; margin-bottom: 1rem; text-transform: capitalize;">${category}</h3>`;
                
                for (const setting of settings) {
                    html += `
                        <div class="setting-item">
                            <div class="setting-info">
                                <h3>${setting.key}</h3>
                                <p>${setting.description || 'No description'}</p>
                                <p style="font-size: 0.8rem; color: var(--primary); margin-top: 0.5rem;">Value: <strong>${setting.value}</strong></p>
                            </div>
                            <div class="setting-actions">
                                <button class="btn btn-secondary btn-small" onclick="editSetting('${setting.key}')">✏️ Edit</button>
                                <button class="btn btn-danger btn-small" onclick="deleteSetting('${setting.key}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
            updateSettingCount();
        }

        async function addSetting(event) {
            event.preventDefault();
            
            const key = document.getElementById('settingKey').value;
            const value = document.getElementById('settingValue').value;
            const category = document.getElementById('settingCategory').value;
            const type = document.getElementById('settingType').value;
            const description = document.getElementById('settingDesc').value;

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value, category, type, description })
                });

                const result = await response.json();
                
                const alertContainer = document.getElementById('alertContainer');
                if (result.success) {
                    alertContainer.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                    event.target.reset();
                    setTimeout(() => loadSettings(), 500);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function deleteSetting(key) {
            if (confirm(`Delete setting '${key}'?`)) {
                try {
                    const response = await fetch(`/api/settings/${key}`, { method: 'DELETE' });
                    const result = await response.json();
                    
                    if (result.success) {
                        showAlert(result.message, 'success');
                        loadSettings();
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        }

        async function editSetting(key) {
            const newValue = prompt(`Enter new value for '${key}':`);
            if (newValue !== null && newValue.trim() !== '') {
                try {
                    const response = await fetch(`/api/settings/${key}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ value: newValue })
                    });

                    const result = await response.json();
                    if (result.success) {
                        showAlert(result.message, 'success');
                        loadSettings();
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('totalSettings').textContent = stats.total_settings;
                document.getElementById('totalChanges').textContent = stats.total_changes;
                document.getElementById('statsTotal').textContent = stats.total_settings;
                document.getElementById('statsCategories').textContent = stats.total_categories;
                document.getElementById('statsHistoryCount').textContent = stats.total_changes;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/history?limit=20');
                const data = await response.json();
                const container = document.getElementById('historyContainer');
                
                if (data.history.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No change history yet.</p></div>';
                    return;
                }

                let html = '';
                for (const entry of data.history) {
                    html += `
                        <div class="history-item">
                            <strong>${entry.setting_key}</strong><br>
                            Changed from <code style="color: var(--danger);">${entry.old_value}</code> to <code style="color: var(--success);">${entry.new_value}</code>
                            <div class="history-time">${new Date(entry.timestamp).toLocaleString()}</div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function updateSettingCount() {
            const container = document.getElementById('settingsContainer');
            const count = container.querySelectorAll('.setting-item').length;
            document.getElementById('totalSettings').textContent = count;
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            alertContainer.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
            setTimeout(() => alertContainer.innerHTML = '', 3000);
        }

        async function exportSettings() {
            try {
                const response = await fetch('/api/export');
                const data = await response.json();
                
                const dataStr = JSON.stringify(data, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `settings-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                
                showAlert('Settings exported successfully! 📥', 'success');
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error exporting settings', 'error');
            }
        }

        // Auto-refresh stats every 5 seconds
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
